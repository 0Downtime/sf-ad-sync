name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pester:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run tests with coverage summary
        shell: pwsh
        run: |
          ./scripts/Invoke-TestSuite.ps1 -Detailed -Coverage -CoverageSummaryPath ./artifacts/test-coverage-summary.json

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-summary
          path: artifacts/test-coverage-summary.json
